version: '3.8'

services:
  app:
    image: lionex-simpleshop:latest
    pull_policy: never
    restart: unless-stopped
    environment:
      - APP_NAME=SimpleShop
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://shop.textory.online
      - DB_CONNECTION=mysql
      - DB_HOST=lionex-mysql
      - DB_PORT=3306
      - DB_DATABASE=simpleshop
      - DB_USERNAME=simpleshop
      - DB_PASSWORD=SimpleShop2025!
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=database
      - SCOUT_DRIVER=meilisearch
      - SCOUT_QUEUE=false
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-masterKey}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - coolify
      - default

  queue:
    image: lionex-simpleshop:latest
    pull_policy: never
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=lionex-mysql
      - DB_PORT=3306
      - DB_DATABASE=simpleshop
      - DB_USERNAME=simpleshop
      - DB_PASSWORD=SimpleShop2025!
      - CACHE_DRIVER=file
      - QUEUE_CONNECTION=database
    depends_on:
      - app
    networks:
      - coolify
      - default

  scheduler:
    image: lionex-simpleshop:latest
    pull_policy: never
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: ["while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=lionex-mysql
      - DB_PORT=3306
      - DB_DATABASE=simpleshop
      - DB_USERNAME=simpleshop
      - DB_PASSWORD=SimpleShop2025!
      - CACHE_DRIVER=file
    depends_on:
      - app
    networks:
      - coolify
      - default

volumes:
  app_storage:
  app_logs:

networks:
  coolify:
    external: true
