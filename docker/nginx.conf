upstream octane {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml application/xml+rss
        application/atom+xml image/svg+xml font/ttf font/otf font/woff font/woff2;

    # Static assets — serve directly + long cache
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location /js/filament/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location /css/filament/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff2?|ttf|eot|otf)$ {
        try_files $uri @octane;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # Everything else → Laravel Octane (Swoole worker on :8000)
    location / {
        try_files $uri @octane;
    }

    location @octane {
        proxy_pass http://octane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /up {
        proxy_pass http://octane;
        proxy_http_version 1.1;
        access_log off;
    }
}
