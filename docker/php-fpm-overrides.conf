[www]
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Higher max_requests = fewer worker recycles = fewer Filament cold-boot
; hits. Was 200 → user-visible 5s spike every ~200 requests because
; killed worker had to re-bootstrap Filament (~3-5s). At 2000 a typical
; visitor session is fully served by one warm worker.
pm.max_requests = 2000

; Slow log so we see if something hangs > 10s
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s
request_terminate_timeout = 60s

; Surface fatals to nginx (and thus container stdout)
catch_workers_output = yes
decorate_workers_output = no
