[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

; Laravel Octane (Swoole worker — keeps app booted in memory between requests)
[program:octane]
command=php /var/www/html/artisan octane:start --server=swoole --host=127.0.0.1 --port=8000 --workers=4 --task-workers=2 --max-requests=500
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
stdout_logfile=/var/log/octane.log
stderr_logfile=/var/log/octane.err
stopsignal=TERM
stopwaitsecs=10

; Nginx — reverse proxy on :80 → Octane :8000 + static files directly
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
