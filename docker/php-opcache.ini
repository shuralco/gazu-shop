; Production OPcache — biggest single perf win for Laravel
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1
opcache.huge_code_pages=1
; JIT — прискорює CPU-bound рендер (Filament/Blade/Livewire) на 20-40%.
; tracing стабільний на PHP 8.2+ під Swoole/Octane. Профіль показав, що
; час admin-сторінок — суто CPU-рендер (SQL лише ~5ms, N+1=0).
opcache.jit=tracing
opcache.jit_buffer_size=128M
realpath_cache_size=4096K
realpath_cache_ttl=600

; Set memory_limit so Filament panel doesn't OOM
memory_limit=512M
