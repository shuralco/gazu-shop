version: '3.8'

services:
  app:
    image: simpleshop:local
    container_name: gazu-shop-app
    ports:
      - "8089:80"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_NAME=GAZU
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8089
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=gazu_shop
      - DB_USERNAME=simpleshop
      - DB_PASSWORD=SimpleShop2025!
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=Redis2025!
      - REDIS_PORT=6379
      - SCOUT_DRIVER=meilisearch
      - SCOUT_QUEUE=false
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=masterKey
    volumes:
      - ./app:/var/www/html/app
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./public:/var/www/html/public
      - ./bootstrap:/var/www/html/bootstrap
      - ./lang:/var/www/html/lang
      - ./vendor:/var/www/html/vendor
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=RootPassword2025!
      - MYSQL_DATABASE=gazu_shop
      - MYSQL_USER=simpleshop
      - MYSQL_PASSWORD=SimpleShop2025!
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRootPassword2025!"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass Redis2025!
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis2025!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=masterKey
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    image: simpleshop:local
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - .env
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=gazu_shop
      - DB_USERNAME=simpleshop
      - DB_PASSWORD=SimpleShop2025!
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=Redis2025!
      - SCOUT_DRIVER=meilisearch
      - SCOUT_QUEUE=false
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=masterKey
    depends_on:
      - app
      - mysql
      - redis
      - meilisearch

  scheduler:
    image: simpleshop:local
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: ["while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    env_file:
      - .env
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=gazu_shop
      - DB_USERNAME=simpleshop
      - DB_PASSWORD=SimpleShop2025!
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=Redis2025!
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=masterKey
    depends_on:
      - app
      - mysql
      - redis
      - meilisearch

volumes:
  app_storage:
  app_logs:
  mysql_data:
  redis_data:
  meilisearch_data:
